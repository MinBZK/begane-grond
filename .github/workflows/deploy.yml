name: Deploy

on:
  pull_request:
    # opened/synchronize/reopened -> build + preview deploy
    # closed -> tear down the preview environment and its image
    types: [opened, synchronize, reopened, closed]
  push:
    # merge to main -> build :latest + deploy the production deployment
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # ghcr.io/anneschuth/begane-grond

jobs:
  quality:
    # Lint, format-check and a real production build gate every deploy. Runs on
    # PRs and on merge to main; the build job below cannot start until this is
    # green, so a broken or unformatted change never reaches GHCR or ZAD.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint -- --max-warnings=0
      - name: Prettier
        run: npm run format:check
      - name: Build
        # The Vite build is itself a check: it fails on template/compile errors
        # that ESLint does not catch. The Docker build below repeats this, but
        # running it here surfaces failures without waiting on the image layers.
        run: npm run build

  build:
    needs: quality # no image is built or pushed unless quality passed
    # Skip the build when a PR is merely closed (nothing to build then).
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to GHCR with the built-in GITHUB_TOKEN
    outputs:
      tag: ${{ steps.tag.outputs.tag }} # immutable sha- tag, shared by deploy jobs
    steps:
      - uses: actions/checkout@v6

      - name: Determine image tag
        id: tag
        # Every build gets an immutable, per-commit tag (sha-<short>). The deploy
        # jobs reference THIS, never :latest. A mutable :latest does not change
        # between deploys, so Kubernetes sees the same image reference and keeps
        # the old pod — the deploy reports success while nothing actually rolls
        # out. A unique tag per commit guarantees the cluster pulls the new image.
        run: |
          short="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "tag=sha-${short}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # PRs: a pr-<n> tag. Every commit: sha-<short> (what we deploy). Main
          # additionally moves :latest as a convenience pointer, never deployed.
          tags: |
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the preview URL as a PR comment
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Deploy to ZAD
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: bg-4s2
          deployment-name: pr-${{ github.event.pull_request.number }}
          component: frontend
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }}
          comment-on-pr: 'true' # drops a clickable preview link in the PR
          wait-for-ready: 'true' # block until the deployment answers on /
          health-endpoint: '/'

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Deploy to ZAD
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: bg-4s2
          # The deployment 'productie' is the one wired to bg.rijks.app. An
          # English-named 'production' deployment also exists but is NOT routed
          # to the domain, so deploying there left the live site stale.
          deployment-name: productie
          component: frontend
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }}
          wait-for-ready: 'true'
          health-endpoint: '/'

  cleanup-preview:
    # When the PR closes (merged or not), remove the ZAD deployment, the
    # GitHub deployment records, and the per-PR image tag. The (empty)
    # GitHub environment is left in place so no admin PAT is needed.
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      deployments: write # delete the GitHub deployment records
      packages: write # delete the per-PR container tag from GHCR
      pull-requests: write # remove the preview comment
    steps:
      - name: Cleanup
        uses: RijksICTGilde/zad-actions/cleanup@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: bg-4s2
          deployment-name: pr-${{ github.event.pull_request.number }}
          delete-github-deployments: 'true'
          delete-container: 'true'
          container-org: ${{ github.repository_owner }}
          container-name: ${{ github.event.repository.name }}
          container-tag: pr-${{ github.event.number }}
