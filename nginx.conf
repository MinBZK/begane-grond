server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-routed deep links (e.g. /fysiek/racks/r12) must
    # serve index.html so the Vue router can boot. Mirrors the dev-server
    # spa-fallback middleware in vite.config.js.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; cache them aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
